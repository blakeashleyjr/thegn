// The control-plane gRPC surface — a mechanical mirror of the ControlApi
// trait + control_wire::EventFrame (thegn-svc/src/control). The HTTP+WS
// surface is primary for thegn's own clients; this exists for external
// tooling that prefers gRPC. Compiled by protox (pure Rust, no protoc).
syntax = "proto3";
package thegn.control.v1;

service Control {
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsReply);
  // Warm-attach: the stream's first frame is the screen snapshot, then live
  // deltas. Ends with a SessionExit frame when the process terminates.
  rpc Attach(AttachRequest) returns (stream Event);
  rpc Detach(DetachRequest) returns (Empty);
  rpc OpenSession(OpenSessionRequest) returns (SessionInfo);
  rpc SendInput(SendInputRequest) returns (Empty);
  rpc Resize(ResizeRequest) returns (Empty);
  rpc Snapshot(SnapshotRequest) returns (Event);
  rpc KillSession(KillSessionRequest) returns (Empty);
  rpc OpenWorktree(OpenWorktreeRequest) returns (Empty);
  // v1: always UNIMPLEMENTED (the contract slot for the preview browser).
  rpc DriveBrowser(DriveBrowserRequest) returns (Empty);
  rpc GitStatus(GitStatusRequest) returns (GitStatusReply);
  rpc GitStage(GitStageRequest) returns (Empty);
  rpc GitCommit(GitCommitRequest) returns (GitCommitReply);
  // The broadcast feed: activity, lease, pairing, session-list events.
  rpc Events(EventsRequest) returns (stream Event);
  rpc LeaseStatus(LeaseStatusRequest) returns (LeaseStatusReply);
  rpc Me(MeRequest) returns (MeReply);
}

message Empty {}

message ListSessionsRequest {}
message ListSessionsReply { repeated SessionInfo sessions = 1; }

message SessionInfo {
  string id = 1;
  string worktree = 2;        // empty = none
  string program = 3;
  string cwd = 4;             // empty = none
  uint32 rows = 5;
  uint32 cols = 6;
  int64 created_at_ms = 7;
  uint32 attached_clients = 8;
  optional int64 lease_expires_at = 9;
}

message AttachRequest {
  string client_id = 1;
  string session = 2;
  bool observer = 3;
  uint32 rows = 4;
  uint32 cols = 5;
}

message DetachRequest {
  string client_id = 1;
  string session = 2;
}

message OpenSessionRequest {
  repeated string argv = 1;
  string cwd = 2;             // empty = none
  repeated EnvVar env = 3;
  uint32 rows = 4;
  uint32 cols = 5;
  string worktree = 6;        // empty = none
}

message EnvVar {
  string key = 1;
  string value = 2;
}

message SendInputRequest {
  string session = 1;
  bytes bytes = 2;
}

message ResizeRequest {
  string session = 1;
  uint32 rows = 2;
  uint32 cols = 3;
}

message SnapshotRequest { string session = 1; }
message KillSessionRequest { string session = 1; }

message OpenWorktreeRequest {
  string repo = 1;
  string branch = 2;          // empty = none
}

message DriveBrowserRequest {
  string session = 1;         // empty = none
  oneof action {
    string navigate_url = 2;
    Empty reload = 3;
    Empty back = 4;
  }
}

message GitStatusRequest { string worktree = 1; }
message GitStatusReply { repeated GitFileStatus files = 1; }
message GitFileStatus {
  string path = 1;
  string code = 2;            // porcelain two-letter code
}

message GitStageRequest {
  string worktree = 1;
  repeated string paths = 2;
}

message GitCommitRequest {
  string worktree = 1;
  string message = 2;
}
message GitCommitReply { string commit = 1; }

message EventsRequest {}

message LeaseStatusRequest {}
message LeaseStatusReply { repeated Lease leases = 1; }
message Lease {
  int64 lease_id = 1;
  string session = 2;
  string kind = 3;            // "attached" | "relay"
  string client = 4;          // empty = none
  optional int64 expires_at = 5;
}

message MeRequest {}
message MeReply {
  string pairing_id = 1;
  string label = 2;
  string scopes = 3;          // csv, e.g. "read,git"
}

// One event frame — mirrors thegn_core::control_wire::EventFrame.
message Event {
  uint64 seq = 1;
  oneof kind {
    Hello hello = 2;
    PaneSnapshot snapshot = 3;
    PaneDelta delta = 4;
    Activity activity = 5;
    LeaseEvent lease = 6;
    PairingEvent pairing = 7;
    Empty sessions = 8;
    SessionExit exit = 9;
  }
}

message Hello {
  uint32 proto = 1;
  string server = 2;
  string scopes = 3;          // csv
}

message PaneSnapshot {
  string session = 1;
  uint64 seq = 2;
  uint32 cols = 3;
  uint32 rows = 4;
  bytes bytes = 5;            // ANSI repaint sequence
}

message PaneDelta {
  string session = 1;
  uint64 seq = 2;
  bytes bytes = 3;            // raw PTY output
}

message Activity { string json = 1; }

message LeaseEvent {
  string session = 1;
  string kind = 2;            // opened|refreshed|released|reaped
  optional int64 expires_at = 3;
}

message PairingEvent {
  string pairing_id = 1;
  string label = 2;
  string scopes = 3;
  string state = 4;           // requested|approved|revoked
}

message SessionExit {
  string session = 1;
  optional int32 code = 2;
}
