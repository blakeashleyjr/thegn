name: ci-setup
description: Install nix + restore caches on GitHub-hosted runners; no-op on self-hosted (nix + caches are host-level).
inputs:
  nix-token:
    description: Classic PAT for private + public github flake fetches.
    required: false
    default: ""
  gc-max-store-size:
    description: Upper bound for the cached /nix/store before GC.
    required: false
    default: 5G
runs:
  using: composite
  steps:
    # ── Self-hosted (ageless) note ──────────────────────────────────────────
    # Every step below is gated on `runner.environment == 'github-hosted'`, so
    # on our self-hosted ageless runners this action does NOTHING: nix is
    # installed on the host (persistent /nix/store), and the warm caches
    # (sccache, CARGO_HOME) + PATH are injected per-job via the runner's
    # .env/.path files (see scripts/ci/ageless-runner-setup.sh). Installing nix
    # or round-tripping the store to the GitHub cache there would be pure
    # overhead — the whole point of self-hosting is that the store already
    # persists. The macOS job is still GitHub-hosted, so these steps run for it.
    #
    # Reclaim runner disk before building. The default ubuntu runner ships ~14G
    # free on /, and a full rust+nix build (debug link of thegn, nix store,
    # coverage instrumentation) can exhaust it — mold then dies mid-link with
    # "failed to write to an output file. Disk full?" / Bus error. Everything
    # here runs through `nix develop`, so the preinstalled toolchains are dead
    # weight; dropping them frees ~20-30G.
    - name: reclaim runner disk
      if: runner.environment == 'github-hosted'
      shell: bash
      run: |
        if [ "${RUNNER_OS:-Linux}" = "Linux" ]; then
          sudo rm -rf /opt/hostedtoolcache /usr/local/lib/android /usr/share/dotnet \
            /usr/local/.ghcup /usr/lib/jvm /opt/ghc /usr/local/share/boost 2>/dev/null || true
          sudo docker image prune -a -f 2>/dev/null || true
        fi
        df -h /
    - uses: DeterminateSystems/nix-installer-action@main
      if: runner.environment == 'github-hosted'
      with:
        # download-resilience: a runner's outbound DNS/fetch occasionally stalls
        # (seen as "Resolving timed out after 15000 ms" on a source tarball,
        # cascading into "Cannot build" for every downstream drv). Give nix more
        # attempts and a longer stall budget so a transient blip retries instead
        # of failing the whole job.
        extra-conf: |
          access-tokens = github.com=${{ inputs.nix-token }}
          connect-timeout = 20
          download-attempts = 5
          stalled-download-timeout = 90
    - uses: nix-community/cache-nix-action@v6
      if: runner.environment == 'github-hosted'
      with:
        primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock', '**/Cargo.lock') }}
        restore-prefixes-first-match: nix-${{ runner.os }}-
        gc-max-store-size: ${{ inputs.gc-max-store-size }}
        purge: true
        purge-prefixes: nix-${{ runner.os }}-
        purge-created: 0
        purge-primary-key: never
    - uses: Swatinem/rust-cache@v2
      if: runner.environment == 'github-hosted'
      with:
        prefix-key: rust-${{ runner.os }}
        key: ${{ hashFiles('flake.lock') }}
        cache-on-failure: true
