name: ci
# Parallel CI: each `just ci` stage runs as its own job so they execute
# concurrently (wall-clock = slowest job) and one push surfaces every failure at
# once instead of fail-fast. Shared setup (nix + caches) lives in the local
# composite action .github/actions/ci-setup.
#
# nix `access-tokens` is fed from the NIX_GITHUB_TOKEN secret — it must read the
# private flake inputs (muse, termite-chat) AND the public ones (nixpkgs/
# flake-utils/rust-overlay, owned by other accounts), so it has to be a CLASSIC
# PAT with `repo` scope (fine-grained can't grant cross-owner access).
on:
  push:
    branches: [main]
  pull_request:
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          # Check out the branch HEAD on a real ref (not the detached
          # refs/pull/N/merge), so git self-tests that read the ambient repo see
          # a normal branch. Falls back to the pushed ref for push events.
          ref: ${{ github.head_ref || github.ref }}
      - uses: ./.github/actions/ci-setup
        with:
          nix-token: ${{ secrets.NIX_GITHUB_TOKEN }}
      - run: nix develop --command just fmt-check
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          # Check out the branch HEAD on a real ref (not the detached
          # refs/pull/N/merge), so git self-tests that read the ambient repo see
          # a normal branch. Falls back to the pushed ref for push events.
          ref: ${{ github.head_ref || github.ref }}
      - uses: ./.github/actions/ci-setup
        with:
          nix-token: ${{ secrets.NIX_GITHUB_TOKEN }}
      - run: nix develop --command just lint
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          # Check out the branch HEAD on a real ref (not the detached
          # refs/pull/N/merge), so git self-tests that read the ambient repo see
          # a normal branch. Falls back to the pushed ref for push events.
          ref: ${{ github.head_ref || github.ref }}
      - uses: ./.github/actions/ci-setup
        with:
          nix-token: ${{ secrets.NIX_GITHUB_TOKEN }}
      - run: nix develop --command just test
  doc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          # Check out the branch HEAD on a real ref (not the detached
          # refs/pull/N/merge), so git self-tests that read the ambient repo see
          # a normal branch. Falls back to the pushed ref for push events.
          ref: ${{ github.head_ref || github.ref }}
      - uses: ./.github/actions/ci-setup
        with:
          nix-token: ${{ secrets.NIX_GITHUB_TOKEN }}
      - run: nix develop --command just doc-check
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          # Check out the branch HEAD on a real ref (not the detached
          # refs/pull/N/merge), so git self-tests that read the ambient repo see
          # a normal branch. Falls back to the pushed ref for push events.
          ref: ${{ github.head_ref || github.ref }}
      - uses: ./.github/actions/ci-setup
        with:
          nix-token: ${{ secrets.NIX_GITHUB_TOKEN }}
      - run: nix develop --command just coverage
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          # Check out the branch HEAD on a real ref (not the detached
          # refs/pull/N/merge), so git self-tests that read the ambient repo see
          # a normal branch. Falls back to the pushed ref for push events.
          ref: ${{ github.head_ref || github.ref }}
      - uses: ./.github/actions/ci-setup
        with:
          nix-token: ${{ secrets.NIX_GITHUB_TOKEN }}
      - run: nix develop --command just smoke
  sandbox-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          # Check out the branch HEAD on a real ref (not the detached
          # refs/pull/N/merge), so git self-tests that read the ambient repo see
          # a normal branch. Falls back to the pushed ref for push events.
          ref: ${{ github.head_ref || github.ref }}
      - uses: ./.github/actions/ci-setup
        with:
          nix-token: ${{ secrets.NIX_GITHUB_TOKEN }}
      # Container-backed suites skip gracefully when podman is absent.
      - run: nix develop --command bash -lc "just sandbox-e2e-dns && just sandbox-e2e-db"
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          # Check out the branch HEAD on a real ref (not the detached
          # refs/pull/N/merge), so git self-tests that read the ambient repo see
          # a normal branch. Falls back to the pushed ref for push events.
          ref: ${{ github.head_ref || github.ref }}
      - uses: ./.github/actions/ci-setup
        with:
          nix-token: ${{ secrets.NIX_GITHUB_TOKEN }}
      - run: nix develop --command just e2e
  nix-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          # Check out the branch HEAD on a real ref (not the detached
          # refs/pull/N/merge), so git self-tests that read the ambient repo see
          # a normal branch. Falls back to the pushed ref for push events.
          ref: ${{ github.head_ref || github.ref }}
      - uses: ./.github/actions/ci-setup
        with:
          nix-token: ${{ secrets.NIX_GITHUB_TOKEN }}
      - run: nix build .#default --print-build-logs
  macos:
    # macos-14 = GitHub-hosted Apple silicon (M1). Apple's `container` runtime
    # needs macOS 26 + Apple silicon, which the hosted image can't exercise, so
    # this only covers the aarch64-darwin build + unit tests; end-to-end `apple`
    # backend verification is the on-device checklist (tasks.md §AV).
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          # Check out the branch HEAD on a real ref (not the detached
          # refs/pull/N/merge), so git self-tests that read the ambient repo see
          # a normal branch. Falls back to the pushed ref for push events.
          ref: ${{ github.head_ref || github.ref }}
      - uses: ./.github/actions/ci-setup
        with:
          nix-token: ${{ secrets.NIX_GITHUB_TOKEN }}
          gc-max-store-size: 8G
      - run: nix develop --command bash -lc "just build && just test"
