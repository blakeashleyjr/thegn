name: ci
# Parallel CI: each `just ci` stage is its own job, so they run concurrently
# (wall-clock = slowest job) and one push surfaces every failure at once. Shared
# setup (nix + caches) lives in the local composite action .github/actions/ci-setup.
#
# Cost control:
#  - macOS bills at a 10x minute multiplier, so the `macos` job is OPT-IN — it
#    runs only on manual dispatch or when a PR carries the `ci:macos` label, not
#    on every PR/main push. (Apple/darwin code is on-device WIP; CI it on demand.)
#  - concurrency cancels superseded runs; every job has a timeout so nothing can
#    silently burn minutes; cache-nix-action + rust-cache keep warm runs cheap.
#
# nix `access-tokens` comes from the NIX_GITHUB_TOKEN secret — it must read the
# private flake inputs (muse, termite-chat) AND public ones (nixpkgs/flake-utils/
# rust-overlay, other owners), so it must be a CLASSIC PAT with `repo` scope.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  fmt:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ./.github/actions/ci-setup
        with:
          nix-token: ${{ secrets.NIX_GITHUB_TOKEN }}
      - run: nix develop --command just fmt-check
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ./.github/actions/ci-setup
        with:
          nix-token: ${{ secrets.NIX_GITHUB_TOKEN }}
      - run: nix develop --command just lint
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ./.github/actions/ci-setup
        with:
          nix-token: ${{ secrets.NIX_GITHUB_TOKEN }}
      # The svc git tests create temp repos; their bare "remote" is made with
      # `git init --bare` (no -b), so a fresh runner's default `master` breaks
      # origin/main tracking. Give the runner the `main` default + an identity.
      - name: git defaults for the svc git tests
        run: |
          git config --global init.defaultBranch main
          git config --global user.email ci@superzej.local
          git config --global user.name "superzej CI"
      - run: nix develop --command just test
  doc:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ./.github/actions/ci-setup
        with:
          nix-token: ${{ secrets.NIX_GITHUB_TOKEN }}
      - run: nix develop --command just doc-check
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ./.github/actions/ci-setup
        with:
          nix-token: ${{ secrets.NIX_GITHUB_TOKEN }}
      - run: nix develop --command just coverage
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ./.github/actions/ci-setup
        with:
          nix-token: ${{ secrets.NIX_GITHUB_TOKEN }}
      - run: nix develop --command just smoke
  sandbox-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ./.github/actions/ci-setup
        with:
          nix-token: ${{ secrets.NIX_GITHUB_TOKEN }}
      # Container-backed suites skip gracefully when podman is absent.
      - run: nix develop --command bash -lc "just sandbox-e2e-dns && just sandbox-e2e-db"
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ./.github/actions/ci-setup
        with:
          nix-token: ${{ secrets.NIX_GITHUB_TOKEN }}
      - run: nix develop --command just e2e
  nix-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ./.github/actions/ci-setup
        with:
          nix-token: ${{ secrets.NIX_GITHUB_TOKEN }}
      - run: nix build .#default --print-build-logs
  macos:
    # OPT-IN (10x minute cost): runs only on manual dispatch or a `ci:macos`
    # labeled PR — not on ordinary PR/main pushes. macos-14 = GitHub-hosted Apple
    # silicon; this covers the aarch64-darwin build + unit tests (end-to-end
    # `apple` backend verification is the on-device checklist, tasks.md §AW).
    if: >-
      github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'ci:macos')
    runs-on: macos-14
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: ./.github/actions/ci-setup
        with:
          nix-token: ${{ secrets.NIX_GITHUB_TOKEN }}
          gc-max-store-size: 8G
      - run: nix develop --command bash -lc "just build && just test"
