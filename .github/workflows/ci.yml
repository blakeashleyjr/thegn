name: ci
# First CI in the repo. The Linux job runs the canonical `just ci` gate; the
# macOS (Apple-silicon) job runs a trimmed build+test subset to keep the
# aarch64-darwin host build — and the Apple `container` backend — green.
#
# Both jobs use `nix develop`, whose flake pulls PRIVATE inputs (muse,
# termite-chat). nix applies `access-tokens` to EVERY github.com fetch, so the
# NIX_GITHUB_TOKEN secret must read both the private inputs AND the public ones
# (nixpkgs/flake-utils/rust-overlay, owned by other accounts). That rules out a
# fine-grained PAT (can't grant cross-owner access) — use a CLASSIC PAT with the
# `repo` scope. Set it under Settings → Secrets and variables → Actions.
on:
  push:
    branches: [main]
  pull_request:
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            access-tokens = github.com=${{ secrets.NIX_GITHUB_TOKEN }}
      # Cache /nix/store in GitHub's own Actions cache (no FlakeHub/Cachix
      # account). Keyed by the lockfiles; restores the latest prior store on a
      # miss so cold nix builds (esp. the slow macOS job) get warm.
      - uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock', '**/Cargo.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
      - name: just ci
        run: nix develop --command just ci
  macos:
    # macos-14 is the GitHub-hosted Apple-silicon (M1) image. Apple's `container`
    # runtime needs macOS 26 + Apple silicon; the hosted image cannot exercise it
    # at runtime, so this job only covers the build + unit-test surface (lint and
    # the heavier nix-build/coverage/smoke stay on the Linux job) to finish fast
    # — end-to-end `apple` backend verification is the on-device checklist (§AV).
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            access-tokens = github.com=${{ secrets.NIX_GITHUB_TOKEN }}
      # Cache /nix/store in GitHub's own Actions cache (no FlakeHub/Cachix
      # account). Keyed by the lockfiles; restores the latest prior store on a
      # miss so cold nix builds (esp. the slow macOS job) get warm.
      - uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock', '**/Cargo.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
      - name: build + test (macOS subset)
        run: nix develop --command bash -lc "just build && just test"
