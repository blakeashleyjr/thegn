# OpenSpec project configuration.
# `schema` selects the workflow (proposal -> specs -> design -> tasks).
# `context` is injected into every artifact instruction the AI generates, so it
# is the single place that teaches agents what superzej is and its hard rules.
# See CLAUDE.md for the full developer guide and tasks.md for the roadmap.
schema: spec-driven
context: |
  superzej (binary `szhost`, aliases `superzej`/`sj`) is a terminal-native
  git-worktree IDE that is its own terminal multiplexer. One process, one
  session: each repo is a workspace, each git worktree is a tab, and the chrome
  (sidebar tree, diff/PR panel, tabbar, statusbar, pin strip) is rendered
  in-process. There is no zellij, no WASM plugins, and no IPC — all stripped in
  Phase 0; references to them in old docs are historical.

  Architecture — a Cargo workspace of three crates:
  - superzej-core: substrate-agnostic, testable domain logic (layered TOML
    config, SQLite DB, keymap registry, theme, sandbox backends, activity state
    machine, gh wrapper). No tokio/termwiz deps.
  - superzej-svc: service trait seams with graceful degradation — GitBackend
    (gix-native reads, CLI fallback + writes), GitHub (octocrab/gh), SSH
    (russh/ssh). Native gaps always fall back to subprocess.
  - superzej-host: the compositor — tokio runtime, portable-pty panes through a
    pluggable PaneEmulator (vt100), termwiz Surface diff-flush rendering,
    in-process chrome.

  Hard invariants (do not violate; they are enforced/tested):
  - Event-driven, ~0% idle CPU. The loop blocks on termwiz poll_input(None) — no
    tick, no timeout. Off-thread producers send on a tokio mpsc channel AND pulse
    the TerminalWaker; the loop drains on wake and re-renders only when dirty.
    Never put blocking I/O (git, DB, subprocess) on the loop; never add a polling
    timeout.
  - Rendering is a damage-region compositor. The pure, unit-tested
    render_plan::plan() maps damage to the cheapest correct frame: Skip (idle),
    Panes (bounded-diff only changed panes), or Full (whole-screen diff). These
    decisions are locked by exhaustive tests run in `just ci` — an idle wake must
    be Skip, pane-only output must be Panes (never recompose chrome), any
    chrome/overlay/geometry change must be Full.
  - git is the source of truth for worktrees; the SQLite DB
    ($XDG_STATE_HOME/superzej/superzej.db, WAL, schema versioned via
    user_version) is a cache + resurrection layer.
  - Performance budget: sub-300ms launch to first frame, <16ms render, 0% idle.
    Expensive setup belongs off-thread.

  Sandboxing: each worktree's interactive process can run in a container
  (podman -> docker -> bwrap -> none); the worktree stays on the host,
  bind-mounted at its real path so host-side git reads keep working.

  The long game (see tasks.md) is two tracks joined by one keystone: an AI-free
  workspace shell (the current shippable product) and an AI/agent layer bridged
  by an LLM proxy. The shell must NEVER hard-depend on the AI layers; AI is
  strictly additive.

  Conventions:
  - Coverage gate is superzej-core only, 95% lines; new core logic needs unit
    tests. I/O/subprocess seams are excluded and covered by test/smoke.sh.
  - Conventional commits (feat(scope):, fix(scope):). Branch off main first;
    commit/push only when asked.
  - Run inside `nix develop`. `just ci` = fmt-check + lint + build + test +
    coverage + smoke + nix-build (+ openspec-validate).
  - This shell often runs inside a live superzej; anything opening the DB or
    spawning the host in tests must isolate XDG_STATE_HOME.

  Roadmap & specs: tasks.md is the authoritative roadmap index (groups A–AX,
  phased). openspec/specs/ is the behavioral source of truth, grown from
  archived changes. Link a tasks.md item to its openspec change when starting
  work. Narrative design docs live in docs/superpowers/{plans,specs}/.
# Per-artifact rules (optional). Additive to the schema's built-in guidance.
rules:
  proposal:
    - Link the corresponding tasks.md roadmap item(s) by group letter + number in the Impact section.
    - Do not propose changes that make the AI-free shell hard-depend on AI layers.
  design:
    - Call out which render damage channel (Skip/Panes/Full) and event-loop wake path the change touches, if any.
    - Note any SQLite schema change and the required user_version bump.
  tasks:
    - Core logic tasks must include unit tests (95% line gate on superzej-core).
    - End with a task to run `just ci` (includes openspec-validate).
