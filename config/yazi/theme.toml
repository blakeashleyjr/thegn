# thegn drawer theme — REGENERATED on every open from `[theme] accent` in
# config.toml ({{ACCENT}} below is substituted with that #rrggbb). Do NOT edit by
# hand; your changes are overwritten. Change the accent instead. Only the accent-
# bearing surfaces are themed here — everything else falls back to yazi's preset.
# (#14161f is the thegn deepest-background, used as the on-accent foreground.)

[mgr.hovered]
bg = "{{ACCENT}}"
fg = "#14161f"

[mgr.cwd]
fg = "{{ACCENT}}"

[mgr.preview_hovered]
underline = true

[mgr.find_keyword]
fg = "{{ACCENT}}"
bold = true

[mgr.count_selected]
bg = "{{ACCENT}}"
fg = "#14161f"

[mgr.marker_marked]
bg = "{{ACCENT}}"
fg = "{{ACCENT}}"

[mgr.tab_active]
bg = "{{ACCENT}}"
fg = "#14161f"

[mgr.border_style]
fg = "{{ACCENT}}"

[status.mode_normal]
bg = "{{ACCENT}}"
fg = "#14161f"
bold = true

# git.yazi status linemode (item 606). Colors mirror thegn's panel diff hues:
# added/untracked green, modified amber, deleted red, updated accent, rest faint.
[git]
modified = { fg = "#f0c674" }
added = { fg = "#79e3a5" }
untracked = { fg = "#79e3a5" }
deleted = { fg = "#f7768e" }
updated = { fg = "{{ACCENT}}" }
unknown = { fg = "#6b7089" }
ignored = { fg = "#6b7089" }
clean = { fg = "#6b7089" }
