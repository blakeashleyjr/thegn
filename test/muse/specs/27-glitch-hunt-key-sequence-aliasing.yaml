name: glitch_hunt_key_sequence_aliasing
case_tmp_env: XDG_STATE_HOME
matrix:
  profiles: [xterm, vt220]
  sizes: ["100x30"]
spawn: ["thegn"]
env:
  XDG_STATE_HOME: "{case_tmp}"
  THEGN_LOG: warn
  MUSE_READY: "1"
  TERM: xterm-256color
sync:
  quiet_window_ms: 2000
snapshot_defaults:
  kind: styled
  masks:
    - {rect: [0, 0, 200, 1]}
  normalize:
    - {re: "L0\\|.*", replace: "L0|<masthead>"}
    - {re: "R0 \\d+ \\d+ .*", replace: "R0 <masked>"}
    # Volatile stats (net/disk/temp/clock/percents) — these leak into any
    # unmasked row (statusbar, text-kind frames) and vary run-to-run.
    - {re: "[↓↑]\\s*\\d+(?:\\.\\d+)?[BKMG]", replace: "<net>"}
    - {re: "\\s*\\d+(?:\\.\\d+)?/\\d+[KMG]", replace: " <disk>"}
    - {re: "\\s*\\d+°C", replace: " <temp>"}
    - {re: "\\s*\\d{1,2}:\\d{2}\\b", replace: " HH:MM"}
    - {re: "\\s*\\d{1,3}%", replace: " NN%"}
steps:
  - begin_step: "startup"
  - expect_visible: {regex: "thegn|thegn|\\$|>", timeout_ms: 20000}
  # Exit the dashboard tile to access the Work tab.
  - key: {key: q}
  - sleep_ms: 200
  # ── Key sequences that could alias across modes ───────────────────────────────
  # Test: Alt+arrows in different modes behave correctly
  - begin_step: "alt-arrows in normal mode"
  - snapshot: {name: normal_mode_baseline}
  - key: {key: left, mods: [alt]}
  - sleep_ms: 80
  - snapshot: {name: alt_left_normal}
  - key: {key: right, mods: [alt]}
  - sleep_ms: 80
  - begin_step: "alt-arrows should not reach shell when in key-lock"
  - key: {key: g, mods: [ctrl]}
  - sleep_ms: 50
  - snapshot: {name: in_key_lock}
  - key: {key: left, mods: [alt]}
  - sleep_ms: 80
  - snapshot: {name: alt_left_in_lock}
  - key: {key: g, mods: [ctrl]}
  - sleep_ms: 50
  # ── Escape key handling: must exit UI layers but not shell ────────────────────
  - begin_step: "escape key routing"
  # In palette
  - key: {key: " ", mods: [ctrl]}
  - sleep_ms: 150
  - key: {key: escape}
  - sleep_ms: 80
  - snapshot: {name: after_palette_escape}
  # In sidebar focused
  - key: {key: s, mods: [alt]}
  - sleep_ms: 80
  - key: {key: escape}
  - sleep_ms: 80
  - snapshot: {name: after_sidebar_escape}
  # In panel
  - key: {key: p, mods: [ctrl, alt]}
  - sleep_ms: 100
  - key: {key: escape}
  - sleep_ms: 80
  - snapshot: {name: after_panel_escape_from_nav}
  - key: {key: p, mods: [ctrl, alt]}
  - sleep_ms: 80
  # ── Ctrl+C must not quit thegn (only the active process) ────────────────────
  - begin_step: "ctrl-c stays in thegn"
  - key: {key: c, mods: [ctrl]}
  - sleep_ms: 100
  - snapshot: {name: after_ctrl_c}
  # thegn must still be running
  - expect_visible: {regex: "thegn|thegn|\\$|>", timeout_ms: 2000}
  # ── Ctrl+Q must trigger quit confirm (not instant quit) ───────────────────────
  - begin_step: "ctrl-q requires confirm"
  # We don't actually quit here — just check it doesn't hard-exit without confirm
  # (This test is tricky — if it DID hard-exit, the expect_visible below would fail)
  # We skip sending Ctrl+Q here since 16-quit.yaml covers the full quit flow.
  # Instead test that pressing Ctrl+\ (SIGQUIT) does not crash thegn.
  - key: {key: "\\", mods: [ctrl]}
  - sleep_ms: 100
  - snapshot: {name: after_ctrl_backslash}
  - expect_visible: {regex: "thegn|thegn|\\$|>", timeout_ms: 2000}
  # ── F-key passthrough: F1–F12 should reach the active pane ──────────────────
  - begin_step: "f-key passthrough"
  - key: {key: f1}
  - sleep_ms: 80
  - key: {key: f5}
  - sleep_ms: 80
  - key: {key: f12}
  - sleep_ms: 80
  - snapshot: {name: after_f_keys}
  # ── Verify correct profile-specific behavior ──────────────────────────────────
  # vt220 profile: Alt+arrows may encode differently; the host should still
  # decode them and route correctly.
  - begin_step: "profile-specific key routing"
  - key: {key: s, mods: [ctrl, alt]}
  - sleep_ms: 80
  - snapshot: {name: sidebar_toggled_profile}
  - key: {key: s, mods: [ctrl, alt]}
  - sleep_ms: 80
  - begin_step: "verify no errors"
  - check_file:
      path: "{case_tmp}/thegn/logs/thegn.log"
      reject_re: "ERROR|thread '.*' panicked|WARN.*OOM|WARN.*corrupt|subtract with overflow|index out of bounds"
