name: themes
case_tmp_env: XDG_STATE_HOME
matrix:
  profiles: [xterm]
  sizes: ["100x30"]
spawn: ["thegn"]
env:
  XDG_STATE_HOME: "{case_tmp}"
  THEGN_LOG: warn
  MUSE_READY: "1"
  TERM: xterm-256color
sync:
  quiet_window_ms: 2000
  max_settle_ms: 10000
snapshot_defaults:
  masks:
    - {rect: [0, 0, 200, 1]}
  normalize:
    - {re: "L0\\|.*", replace: "L0|<masthead>"}
    - {re: "R0 \\d+ \\d+ .*", replace: "R0 <masked>"}
    # Volatile stats (net/disk/temp/clock/percents) — these leak into any
    # unmasked row (statusbar, text-kind frames) and vary run-to-run.
    - {re: "[↓↑]\\s*\\d+(?:\\.\\d+)?[BKMG]", replace: "<net>"}
    - {re: "\\s*\\d+(?:\\.\\d+)?/\\d+[KMG]", replace: " <disk>"}
    - {re: "\\s*\\d+°C", replace: " <temp>"}
    - {re: "\\s*\\d{1,2}:\\d{2}\\b", replace: " HH:MM"}
    - {re: "\\s*\\d{1,3}%", replace: " NN%"}
steps:
  - expect_visible: {regex: "thegn|thegn|\\$|>", timeout_ms: 20000}
  # Exit the dashboard tile to access the Work tab.
  - key: {key: q}
  - sleep_ms: 200
  - snapshot: {name: theme_1, kind: styled}
  - snapshot:
      name: theme_1_pixel
      kind: pixel
      scale: 1
      masks:
        - {rect: [0, 0, 200, 1]}
  # Cycle to theme 2
  - key: {key: t, mods: [ctrl, alt]}
  - sleep_ms: 200
  - snapshot: {name: theme_2, kind: styled}
  - snapshot:
      name: theme_2_pixel
      kind: pixel
      scale: 1
      masks:
        - {rect: [0, 0, 200, 1]}
  # Cycle to theme 3
  - key: {key: t, mods: [ctrl, alt]}
  - sleep_ms: 200
  - snapshot: {name: theme_3, kind: styled}
  - snapshot:
      name: theme_3_pixel
      kind: pixel
      scale: 1
      masks:
        - {rect: [0, 0, 200, 1]}
  # Cycle to theme 4
  - key: {key: t, mods: [ctrl, alt]}
  - sleep_ms: 200
  - snapshot: {name: theme_4, kind: styled}
  - snapshot:
      name: theme_4_pixel
      kind: pixel
      scale: 1
      masks:
        - {rect: [0, 0, 200, 1]}
  # Cycle back to theme 1
  - key: {key: t, mods: [ctrl, alt]}
  - sleep_ms: 200
  - snapshot: {name: theme_1_again, kind: styled}
  - check_file:
      path: "{case_tmp}/thegn/logs/thegn.log"
      reject_re: "ERROR|thread '.*' panicked|WARN.*OOM|WARN.*corrupt"
