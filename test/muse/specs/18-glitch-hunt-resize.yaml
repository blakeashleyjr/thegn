name: glitch_hunt_resize
case_tmp_env: XDG_STATE_HOME
matrix:
  profiles: [xterm]
  sizes: ["100x30"]
spawn: ["szhost"]
env:
  XDG_STATE_HOME: "{case_tmp}"
  SUPERZEJ_LOG: warn
  MUSE_READY: "1"
  TERM: xterm-256color
sync:
  # Tighter quiet window so we catch corruption within one frame cycle
  quiet_window_ms: 2000
  max_settle_ms: 3000
snapshot_defaults:
  kind: styled
steps:
  - begin_step: "startup"
  - expect_visible: {regex: "szhost|superzej|\\$|>", timeout_ms: 8000}
  # Exit the dashboard tile to access the Work tab.
  - key: {key: q}
  - sleep_ms: 200
  - snapshot: {name: before_resize_storm}
  # ── Resize storm: hammer transitions through every breakpoint ─────────────────
  - begin_step: "resize storm"
  - resize: "200x50"
  - sleep_ms: 40
  - resize: "80x24"
  - sleep_ms: 40
  - resize: "40x12"
  - sleep_ms: 40
  - resize: "100x30"
  - sleep_ms: 40
  - resize: "160x45"
  - sleep_ms: 40
  - resize: "50x15"
  - sleep_ms: 40
  - resize: "100x30"
  - sleep_ms: 80
  - snapshot: {name: after_resize_storm}
  # ── Open panel during resize, then resize again ───────────────────────────────
  - begin_step: "panel during resize"
  - key: {key: p, mods: [ctrl, alt]}
  - sleep_ms: 100
  - resize: "80x24"
  - sleep_ms: 50
  - resize: "120x35"
  - sleep_ms: 50
  - resize: "100x30"
  - sleep_ms: 80
  - snapshot: {name: panel_after_resize}
  - key: {key: p, mods: [ctrl, alt]}
  - sleep_ms: 80
  # ── Sidebar toggle during resize ─────────────────────────────────────────────
  - begin_step: "sidebar during resize"
  - key: {key: s, mods: [ctrl, alt]}
  - sleep_ms: 40
  - resize: "60x18"
  - sleep_ms: 50
  - resize: "100x30"
  - sleep_ms: 50
  - key: {key: s, mods: [ctrl, alt]}
  - sleep_ms: 80
  - snapshot: {name: sidebar_after_resize}
  # ── Very small size: chrome must not overlap content ──────────────────────────
  - begin_step: "minimum viable size"
  - resize: "40x10"
  - sleep_ms: 100
  - snapshot: {name: minimum_size_40x10}
  # No panic, no OOM
  - resize: "100x30"
  - sleep_ms: 80
  - snapshot: {name: restored_from_minimum}
  - begin_step: "verify no errors"
  - check_file:
      path: "{case_tmp}/superzej/logs/szhost.log"
      reject_re: "ERROR|thread '.*' panicked|WARN.*OOM|WARN.*corrupt|subtract with overflow|index out of bounds"
