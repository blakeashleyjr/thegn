name: panel_work
case_tmp_env: XDG_STATE_HOME
matrix:
  profiles: [xterm]
  sizes: ["100x30"]
spawn: ["thegn"]
env:
  XDG_STATE_HOME: "{case_tmp}"
  THEGN_LOG: warn
  MUSE_READY: "1"
  TERM: xterm-256color
sync:
  quiet_window_ms: 2000
  max_settle_ms: 10000
snapshot_defaults:
  masks:
    - {rect: [0, 0, 200, 1]}
  normalize:
    - {re: "L0\\|.*", replace: "L0|<masthead>"}
    - {re: "R0 \\d+ \\d+ .*", replace: "R0 <masked>"}
steps:
  - expect_visible: {regex: "thegn|thegn|\\$|>", timeout_ms: 8000}
  # Exit the dashboard tile to access the Work tab.
  - key: {key: q}
  - sleep_ms: 200
  - key: {key: p, mods: [ctrl, alt]}
  - sleep_ms: 200
  - key: {key: "2", mods: [alt]}
  - sleep_ms: 100
  - snapshot: {name: panel_work, kind: styled}
  # Navigate sections
  - key: {key: j}
  - sleep_ms: 80
  - snapshot: {name: panel_work_nav1, kind: styled}
  - key: {key: j}
  - sleep_ms: 80
  - snapshot: {name: panel_work_nav2, kind: styled}
  - key: {key: j}
  - sleep_ms: 80
  - snapshot: {name: panel_work_nav3, kind: styled}
  - check_file:
      path: "{case_tmp}/thegn/logs/thegn.log"
      reject_re: "ERROR|thread '.*' panicked|WARN.*OOM|WARN.*corrupt"
