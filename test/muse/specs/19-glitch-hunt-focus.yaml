name: glitch_hunt_focus
case_tmp_env: XDG_STATE_HOME
matrix:
  profiles: [xterm]
  sizes: ["100x30"]
spawn: ["thegn"]
env:
  XDG_STATE_HOME: "{case_tmp}"
  THEGN_LOG: warn
  MUSE_READY: "1"
  TERM: xterm-256color
sync:
  quiet_window_ms: 2000
snapshot_defaults:
  kind: styled
  masks:
    - {rect: [0, 0, 200, 1]}
  normalize:
    - {re: "L0\\|.*", replace: "L0|<masthead>"}
    - {re: "R0 \\d+ \\d+ .*", replace: "R0 <masked>"}
    # Volatile stats (net/disk/temp/clock/percents) — these leak into any
    # unmasked row (statusbar, text-kind frames) and vary run-to-run.
    - {re: "[↓↑]\\s*\\d+(?:\\.\\d+)?[BKMG]", replace: "<net>"}
    - {re: "\\s*\\d+(?:\\.\\d+)?/\\d+[KMG]", replace: " <disk>"}
    - {re: "\\s*\\d+°C", replace: " <temp>"}
    - {re: "\\s*\\d{1,2}:\\d{2}\\b", replace: " HH:MM"}
    - {re: "\\s*\\d{1,3}%", replace: " NN%"}
steps:
  - begin_step: "startup"
  - expect_visible: {regex: "thegn|thegn|\\$|>", timeout_ms: 20000}
  # Exit the dashboard tile to access the Work tab.
  - key: {key: q}
  - sleep_ms: 200
  # ── Pane focus routing under splits ──────────────────────────────────────────
  - begin_step: "create split layout"
  - key: {key: n, mods: [alt]}
  - sleep_ms: 200
  - key: {key: n, mods: [alt, shift]}
  - sleep_ms: 200
  - snapshot: {name: three_pane_layout}
  # Rapid focus cycling — verify we never get stuck
  - begin_step: "rapid focus cycling"
  - key: {key: left, mods: [alt]}
  - key: {key: down, mods: [alt]}
  - key: {key: right, mods: [alt]}
  - key: {key: up, mods: [alt]}
  - key: {key: left, mods: [alt]}
  - key: {key: right, mods: [alt]}
  - key: {key: down, mods: [alt]}
  - key: {key: up, mods: [alt]}
  - sleep_ms: 100
  - snapshot: {name: after_rapid_focus}
  # Zoom + focus change + unzoom
  - begin_step: "zoom interleaved with focus"
  - key: {key: z, mods: [ctrl, alt]}
  - sleep_ms: 80
  - key: {key: left, mods: [alt]}
  - sleep_ms: 80
  - snapshot: {name: zoom_with_focus_move}
  - key: {key: z, mods: [ctrl, alt]}
  - sleep_ms: 80
  - snapshot: {name: unzoom_after_focus_move}
  # Panel open while a split pane is focused
  - begin_step: "panel focus interaction"
  - key: {key: right, mods: [alt]}
  - sleep_ms: 80
  - key: {key: p, mods: [ctrl, alt]}
  - sleep_ms: 150
  - key: {key: "."} # focus panel
  - sleep_ms: 80
  - snapshot: {name: panel_while_split_focused}
  - key: {key: p, mods: [ctrl, alt]}
  - sleep_ms: 80
  # Key-lock in a pane, switch pane, verify lock on right pane
  - begin_step: "key-lock focus boundary"
  - key: {key: g, mods: [ctrl]}
  - sleep_ms: 80
  - snapshot: {name: locked_before_focus_switch}
  # While locked, focus move should be blocked (no navigation to other pane)
  - key: {key: left, mods: [alt]}
  - sleep_ms: 80
  - snapshot: {name: locked_after_focus_attempt}
  # Unlock
  - key: {key: g, mods: [ctrl]}
  - sleep_ms: 80
  - snapshot: {name: unlocked}
  # ── Sidebar focus interaction ─────────────────────────────────────────────────
  - begin_step: "sidebar focus does not bleed"
  - key: {key: s, mods: [alt]}
  - sleep_ms: 100
  - key: {key: j}
  - key: {key: j}
  - sleep_ms: 80
  - snapshot: {name: sidebar_focused_with_splits}
  # Type in sidebar search — should NOT appear in any pane
  - write: "main"
  - sleep_ms: 100
  - snapshot: {name: sidebar_search_active}
  - key: {key: escape}
  - sleep_ms: 80
  - begin_step: "verify no errors"
  - check_file:
      path: "{case_tmp}/thegn/logs/thegn.log"
      reject_re: "ERROR|thread '.*' panicked|WARN.*OOM|WARN.*corrupt|subtract with overflow|index out of bounds"
