name: sidebar
case_tmp_env: XDG_STATE_HOME
matrix:
  profiles: [xterm]
  sizes: ["100x30", "160x40"]
spawn: ["thegn"]
env:
  XDG_STATE_HOME: "{case_tmp}"
  THEGN_LOG: warn
  MUSE_READY: "1"
  TERM: xterm-256color
sync:
  quiet_window_ms: 2000
  max_settle_ms: 10000
snapshot_defaults:
  kind: styled
  masks:
    - {rect: [0, 0, 200, 1]}
  normalize:
    - {re: "L0\\|.*", replace: "L0|<masthead>"}
    - {re: "R0 \\d+ \\d+ .*", replace: "R0 <masked>"}
steps:
  - begin_step: "startup"
  - expect_visible: {regex: "thegn|thegn|\\$|>", timeout_ms: 8000}
  # Exit the dashboard tile to access the Work tab.
  - key: {key: q}
  - sleep_ms: 200
  - snapshot: {name: sidebar_default}
  - begin_step: "focus sidebar"
  - key: {key: s, mods: [alt]}
  - sleep_ms: 100
  - snapshot: {name: sidebar_focused}
  - begin_step: "navigate sidebar"
  - key: {key: j}
  - key: {key: j}
  - key: {key: j}
  - sleep_ms: 100
  - snapshot: {name: sidebar_nav}
  - begin_step: "unfocus sidebar"
  - key: {key: escape}
  - sleep_ms: 100
  - begin_step: "hide sidebar"
  - key: {key: s, mods: [ctrl, alt]}
  - sleep_ms: 100
  - snapshot: {name: sidebar_hidden}
  # Confirm no sidebar content visible when hidden
  - expect_not_visible: {text: "sidebar", timeout_ms: 200}
  - begin_step: "restore sidebar"
  - key: {key: s, mods: [ctrl, alt]}
  - sleep_ms: 100
  - snapshot: {name: sidebar_restored}
  - begin_step: "verify no errors"
  - check_file:
      path: "{case_tmp}/thegn/logs/thegn.log"
      reject_re: "ERROR|thread '.*' panicked|WARN.*OOM|WARN.*corrupt"
