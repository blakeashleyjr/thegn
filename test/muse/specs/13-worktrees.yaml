name: worktrees
case_tmp_env: XDG_STATE_HOME
matrix:
  profiles: [xterm]
  sizes: ["100x30"]
spawn: ["thegn"]
env:
  XDG_STATE_HOME: "{case_tmp}"
  THEGN_LOG: warn
  MUSE_READY: "1"
  TERM: xterm-256color
sync:
  quiet_window_ms: 2000
  max_settle_ms: 10000
snapshot_defaults:
  masks:
    - {rect: [0, 0, 200, 1]}
  normalize:
    - {re: "L0\\|.*", replace: "L0|<masthead>"}
    - {re: "R0 \\d+ \\d+ .*", replace: "R0 <masked>"}
steps:
  - expect_visible: {regex: "thegn|thegn|\\$|>", timeout_ms: 8000}
  # Exit the dashboard tile to access the Work tab.
  - key: {key: q}
  - sleep_ms: 200
  - snapshot: {name: initial_worktrees, kind: styled}
  # Switch to next worktree
  - key: {key: down, mods: [alt]}
  - sleep_ms: 200
  - snapshot: {name: worktree_switched, kind: styled}
  # Switch back
  - key: {key: up, mods: [alt]}
  - sleep_ms: 200
  - snapshot: {name: worktree_back, kind: styled}
  # Attempt close (should show confirm dialog since worktree may have processes)
  - key: {key: x, mods: [alt, shift]}
  - sleep_ms: 300
  - snapshot: {name: worktree_close_prompt, kind: styled}
  # Cancel
  - key: {key: escape}
  - sleep_ms: 100
  - snapshot: {name: worktree_close_cancelled, kind: styled}
  - check_file:
      path: "{case_tmp}/thegn/logs/thegn.log"
      reject_re: "ERROR|thread '.*' panicked|WARN.*OOM|WARN.*corrupt"
