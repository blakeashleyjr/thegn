name: search
case_tmp_env: XDG_STATE_HOME
matrix:
  profiles: [xterm]
  sizes: ["100x30"]
spawn: ["szhost"]
env:
  XDG_STATE_HOME: "{case_tmp}"
  SUPERZEJ_LOG: warn
  MUSE_READY: "1"
  TERM: xterm-256color
sync:
  quiet_window_ms: 2000
  max_settle_ms: 10000
steps:
  - expect_visible: {regex: "szhost|superzej|\\$|>", timeout_ms: 8000}
  # Exit the dashboard tile to access the Work tab.
  - key: {key: q}
  - sleep_ms: 200
  # Pane copy-mode/search (Ctrl+Alt+F or /)
  - key: {key: f, mods: [ctrl, alt]}
  - sleep_ms: 300
  - snapshot: {name: copy_mode_open, kind: styled}
  # Type a search query
  - write: "error"
  - sleep_ms: 200
  - snapshot: {name: copy_mode_search, kind: styled}
  # Exit copy mode
  - key: {key: escape}
  - sleep_ms: 100
  - snapshot: {name: copy_mode_closed, kind: styled}
  - check_file:
      path: "{case_tmp}/superzej/logs/szhost.log"
      reject_re: "ERROR|thread '.*' panicked|WARN.*OOM|WARN.*corrupt"
