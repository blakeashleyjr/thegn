name: pins
case_tmp_env: XDG_STATE_HOME
matrix:
  profiles: [xterm]
  sizes: ["100x30"]
spawn: ["szhost"]
env:
  XDG_STATE_HOME: "{case_tmp}"
  SUPERZEJ_LOG: warn
  MUSE_READY: "1"
  TERM: xterm-256color
sync:
  quiet_window_ms: 2000
  max_settle_ms: 10000
steps:
  - expect_visible: {regex: "szhost|superzej|\\$|>", timeout_ms: 8000}
  # Exit the dashboard tile to access the Work tab.
  - key: {key: q}
  - sleep_ms: 200
  # Show the pin strip (Ctrl+Alt+B)
  - key: {key: b, mods: [ctrl, alt]}
  - sleep_ms: 200
  - snapshot: {name: strip_visible, kind: styled}
  # Grow the strip
  - key: {key: "]", mods: [ctrl, alt]}
  - sleep_ms: 100
  - snapshot: {name: strip_grown, kind: styled}
  # Shrink the strip back
  - key: {key: "[", mods: [ctrl, alt]}
  - sleep_ms: 100
  - snapshot: {name: strip_shrunk, kind: styled}
  # Hide the strip
  - key: {key: b, mods: [ctrl, alt]}
  - sleep_ms: 100
  - snapshot: {name: strip_hidden, kind: styled}
  - check_file:
      path: "{case_tmp}/superzej/logs/szhost.log"
      reject_re: "ERROR|thread '.*' panicked|WARN.*OOM|WARN.*corrupt"
