name: pane_splits
case_tmp_env: XDG_STATE_HOME
matrix:
  profiles: [xterm]
  sizes: ["100x30", "80x24"]
spawn: ["szhost"]
env:
  XDG_STATE_HOME: "{case_tmp}"
  SUPERZEJ_LOG: warn
  MUSE_READY: "1"
  TERM: xterm-256color
sync:
  quiet_window_ms: 2000
  max_settle_ms: 10000
steps:
  - expect_visible: {regex: "szhost|superzej|\\$|>", timeout_ms: 8000}
  # Exit the dashboard tile to access the Work tab.
  - key: {key: q}
  - sleep_ms: 200
  - snapshot: {name: single_pane, kind: styled}
  # Split horizontally (new pane below)
  - key: {key: n, mods: [alt]}
  - sleep_ms: 200
  - snapshot: {name: two_pane_h, kind: styled}
  # Split vertically (new pane right)
  - key: {key: n, mods: [alt, shift]}
  - sleep_ms: 200
  - snapshot: {name: three_pane, kind: styled}
  # Focus tour: move between panes
  - key: {key: left, mods: [alt]}
  - sleep_ms: 80
  - snapshot: {name: focus_left, kind: styled}
  - key: {key: right, mods: [alt]}
  - sleep_ms: 80
  - snapshot: {name: focus_right, kind: styled}
  - key: {key: up, mods: [alt]}
  - sleep_ms: 80
  - snapshot: {name: focus_up, kind: styled}
  - key: {key: down, mods: [alt]}
  - sleep_ms: 80
  - snapshot: {name: focus_down, kind: styled}
  # Zoom active pane
  - key: {key: z, mods: [ctrl, alt]}
  - sleep_ms: 100
  - snapshot: {name: zoomed, kind: styled}
  # Unzoom
  - key: {key: z, mods: [ctrl, alt]}
  - sleep_ms: 100
  - snapshot: {name: unzoomed, kind: styled}
  - check_file:
      path: "{case_tmp}/superzej/logs/szhost.log"
      reject_re: "ERROR|thread '.*' panicked|WARN.*OOM|WARN.*corrupt"
