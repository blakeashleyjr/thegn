name: tabs
case_tmp_env: XDG_STATE_HOME
matrix:
  profiles: [xterm]
  sizes: ["100x30"]
spawn: ["szhost"]
env:
  XDG_STATE_HOME: "{case_tmp}"
  SUPERZEJ_LOG: warn
  MUSE_READY: "1"
  TERM: xterm-256color
sync:
  quiet_window_ms: 2000
  max_settle_ms: 10000
steps:
  - expect_visible: {regex: "szhost|superzej|\\$|>", timeout_ms: 8000}
  # Exit the dashboard tile to access the Work tab.
  - key: {key: q}
  - sleep_ms: 200
  - snapshot: {name: one_tab, kind: styled}
  # Open a second tab (new worktree tab)
  - key: {key: t, mods: [alt]}
  - sleep_ms: 300
  - snapshot: {name: two_tabs, kind: styled}
  # Open a third tab
  - key: {key: t, mods: [alt]}
  - sleep_ms: 300
  - snapshot: {name: three_tabs, kind: styled}
  # Navigate prev / next
  - key: {key: left, mods: [alt]}
  - sleep_ms: 100
  - snapshot: {name: tab_prev, kind: styled}
  - key: {key: right, mods: [alt]}
  - sleep_ms: 100
  - snapshot: {name: tab_next, kind: styled}
  # Close current tab (expect confirm dialog for worktree)
  - key: {key: x, mods: [alt]}
  - sleep_ms: 300
  - snapshot: {name: close_confirm, kind: styled}
  # Cancel the close
  - key: {key: escape}
  - sleep_ms: 100
  - snapshot: {name: close_cancelled, kind: styled}
  - check_file:
      path: "{case_tmp}/superzej/logs/szhost.log"
      reject_re: "ERROR|thread '.*' panicked|WARN.*OOM|WARN.*corrupt"
