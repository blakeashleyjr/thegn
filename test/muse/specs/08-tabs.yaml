name: tabs
case_tmp_env: XDG_STATE_HOME
matrix:
  profiles: [xterm]
  sizes: ["100x30"]
spawn: ["thegn"]
env:
  XDG_STATE_HOME: "{case_tmp}"
  THEGN_LOG: warn
  MUSE_READY: "1"
  TERM: xterm-256color
sync:
  quiet_window_ms: 2000
  max_settle_ms: 10000
snapshot_defaults:
  masks:
    - {rect: [0, 0, 200, 1]}
  normalize:
    - {re: "L0\\|.*", replace: "L0|<masthead>"}
    - {re: "R0 \\d+ \\d+ .*", replace: "R0 <masked>"}
    # Volatile stats (net/disk/temp/clock/percents) — these leak into any
    # unmasked row (statusbar, text-kind frames) and vary run-to-run.
    - {re: "[↓↑]\\s*\\d+(?:\\.\\d+)?[BKMG]", replace: "<net>"}
    - {re: "\\s*\\d+(?:\\.\\d+)?/\\d+[KMG]", replace: " <disk>"}
    - {re: "\\s*\\d+°C", replace: " <temp>"}
    - {re: "\\s*\\d{1,2}:\\d{2}\\b", replace: " HH:MM"}
    - {re: "\\s*\\d{1,3}%", replace: " NN%"}
steps:
  - expect_visible: {regex: "thegn|thegn|\\$|>", timeout_ms: 20000}
  # Exit the dashboard tile to access the Work tab.
  - key: {key: q}
  - sleep_ms: 200
  - snapshot: {name: one_tab, kind: styled}
  # Open a second tab (new worktree tab)
  - key: {key: t, mods: [alt]}
  - sleep_ms: 300
  - snapshot: {name: two_tabs, kind: styled}
  # Open a third tab
  - key: {key: t, mods: [alt]}
  - sleep_ms: 300
  - snapshot: {name: three_tabs, kind: styled}
  # Navigate prev / next
  - key: {key: left, mods: [alt]}
  - sleep_ms: 100
  - snapshot: {name: tab_prev, kind: styled}
  - key: {key: right, mods: [alt]}
  - sleep_ms: 100
  - snapshot: {name: tab_next, kind: styled}
  # Close current tab (expect confirm dialog for worktree)
  - key: {key: x, mods: [alt]}
  - sleep_ms: 300
  - snapshot: {name: close_confirm, kind: styled}
  # Cancel the close
  - key: {key: escape}
  - sleep_ms: 100
  - snapshot: {name: close_cancelled, kind: styled}
  - check_file:
      path: "{case_tmp}/thegn/logs/thegn.log"
      reject_re: "ERROR|thread '.*' panicked|WARN.*OOM|WARN.*corrupt"
