name: glitch_hunt_mode_machine
case_tmp_env: XDG_STATE_HOME
matrix:
  profiles: [xterm]
  sizes: ["100x30"]
spawn: ["szhost"]
env:
  XDG_STATE_HOME: "{case_tmp}"
  SUPERZEJ_LOG: warn
  MUSE_READY: "1"
  TERM: xterm-256color
sync:
  quiet_window_ms: 2000
snapshot_defaults:
  kind: styled
steps:
  - begin_step: "startup"
  - expect_visible: {regex: "szhost|superzej|\\$|>", timeout_ms: 8000}
  # Exit the dashboard tile to access the Work tab.
  - key: {key: q}
  - sleep_ms: 200
  # ── Mode machine: can we escape from any state? ───────────────────────────────
  # Enter every mode, then press Escape multiple times — we must always end up
  # back in normal mode without any visual corruption.
  - begin_step: "key-lock escape chain"
  - key: {key: g, mods: [ctrl]}
  - sleep_ms: 50
  - key: {key: g, mods: [ctrl]}
  - sleep_ms: 50
  - key: {key: escape}
  - sleep_ms: 50
  - snapshot: {name: after_lock_unlock_escape}
  - begin_step: "emacs mode escape chain"
  - key: {key: e, mods: [ctrl, alt]}
  - sleep_ms: 50
  - key: {key: n, mods: [ctrl, alt]}
  - sleep_ms: 50
  - snapshot: {name: after_emacs_back_to_normal}
  - begin_step: "panel mode escape chain"
  - key: {key: p, mods: [ctrl, alt]}
  - sleep_ms: 100
  - key: {key: p, mods: [ctrl, alt]}
  - sleep_ms: 80
  - key: {key: escape}
  - sleep_ms: 50
  - snapshot: {name: after_panel_escape}
  - begin_step: "palette escape chain"
  - key: {key: " ", mods: [ctrl]}
  - sleep_ms: 150
  - key: {key: escape}
  - sleep_ms: 80
  - snapshot: {name: after_palette_escape}
  - begin_step: "copy-mode escape chain"
  - key: {key: f, mods: [ctrl, alt]}
  - sleep_ms: 150
  - key: {key: escape}
  - sleep_ms: 80
  - snapshot: {name: after_copymode_escape}
  # ── Double-open stress: open same overlay twice ───────────────────────────────
  - begin_step: "double-open panel"
  - key: {key: p, mods: [ctrl, alt]}
  - sleep_ms: 80
  - key: {key: p, mods: [ctrl, alt]}
  - sleep_ms: 80
  - key: {key: p, mods: [ctrl, alt]}
  - sleep_ms: 80
  - snapshot: {name: after_double_open_panel}
  - key: {key: p, mods: [ctrl, alt]}
  - sleep_ms: 80
  - begin_step: "double-open palette"
  - key: {key: " ", mods: [ctrl]}
  - sleep_ms: 80
  - key: {key: " ", mods: [ctrl]}
  - sleep_ms: 80
  - key: {key: escape}
  - sleep_ms: 80
  - snapshot: {name: after_double_open_palette}
  # ── Mode leakage: input in one mode should not affect another ─────────────────
  - begin_step: "mode does not leak after escape"
  - key: {key: g, mods: [ctrl]}
  - sleep_ms: 50
  - key: {key: g, mods: [ctrl]}
  - sleep_ms: 50
  # Now in normal mode — verify sidebar toggle still works
  - key: {key: s, mods: [ctrl, alt]}
  - sleep_ms: 80
  - snapshot: {name: sidebar_toggle_after_lock_cycle}
  - key: {key: s, mods: [ctrl, alt]}
  - sleep_ms: 80
  # ── Rapid mode transitions ────────────────────────────────────────────────────
  - begin_step: "rapid mode transitions"
  - key: {key: g, mods: [ctrl]}
  - key: {key: g, mods: [ctrl]}
  - key: {key: e, mods: [ctrl, alt]}
  - key: {key: n, mods: [ctrl, alt]}
  - key: {key: p, mods: [ctrl, alt]}
  - key: {key: p, mods: [ctrl, alt]}
  - key: {key: " ", mods: [ctrl]}
  - key: {key: escape}
  - sleep_ms: 150
  - snapshot: {name: after_rapid_mode_transitions}
  - begin_step: "verify no errors"
  - check_file:
      path: "{case_tmp}/superzej/logs/szhost.log"
      reject_re: "ERROR|thread '.*' panicked|WARN.*OOM|WARN.*corrupt|subtract with overflow|index out of bounds"
