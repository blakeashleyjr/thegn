name: quit
case_tmp_env: XDG_STATE_HOME
matrix:
  profiles: [xterm]
  sizes: ["100x30"]
spawn: ["thegn"]
env:
  XDG_STATE_HOME: "{case_tmp}"
  THEGN_LOG: warn
  MUSE_READY: "1"
  TERM: xterm-256color
sync:
  quiet_window_ms: 2000
  max_settle_ms: 10000
steps:
  - expect_visible: {regex: "thegn|thegn|\\$|>", timeout_ms: 8000}
  # Exit the dashboard tile — 'q' returns control to the host (work tab).
  # Ctrl+Q is then intercepted by the host keymap before reaching the pane.
  - key: {key: q}
  - sleep_ms: 500
  - key: {key: q, mods: [ctrl]}
  - expect_exit: {code: 0, timeout_ms: 4000}
  - check_file:
      path: "{case_tmp}/thegn/logs/thegn.log"
      reject_re: "ERROR|thread '.*' panicked|WARN.*OOM|WARN.*corrupt"
