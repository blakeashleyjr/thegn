# treefmt — single formatter config for the entire repo.
# Run via `nix fmt` (flake formatter) or `treefmt` in the dev shell.
# https://github.com/numtide/treefmt

# Files/paths excluded from ALL formatters.
excludes = [
  "*.kdl",     # no kdl formatter; layouts are hand-maintained
  "*.lock",
  "LICENSE",
  "target/*",
  "result",
  ".direnv/*",
  ".git/*",
]

[formatter.rustfmt]
command = "rustfmt"
options = ["--config", "skip_children=true", "--edition", "2024"]
includes = ["*.rs"]

[formatter.alejandra]
command = "alejandra"
includes = ["*.nix"]

[formatter.shfmt]
command = "shfmt"
options = ["-w", "-i", "2", "-s"]
includes = ["*.sh", "*.bash"]

[formatter.taplo]
command = "taplo"
options = ["format"]
includes = ["*.toml"]

[formatter.yamlfmt]
command = "yamlfmt"
includes = ["*.yaml", "*.yml"]

[formatter.prettier]
# Fixed-point shim: prettier's markdown printer is not idempotent on code
# spans that wrap across a line break, so the shim re-runs it until the
# output is stable (otherwise pre-commit --fail-on-change fails repeatedly).
command = "./test/fmt/prettier-stable.sh"
includes = ["*.md"]
