[package]
name = "superzej"
version = "0.1.0"
edition = "2021"
description = "Terminal-native git-worktree IDE on top of zellij"
license = "MIT"
default-run = "superzej"

[[bin]]
name = "superzej"
path = "src/main.rs"

[dependencies]
clap = { version = "4.5", features = ["derive", "env"] }
rusqlite = { version = "0.32", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
walkdir = "2.5"
anyhow = "1"
syntect = { version = "5", default-features = false, features = [
  "default-syntaxes",
  "default-themes",
  "regex-fancy",
] }
# Cross-platform CPU/memory sampling (Linux/macOS/Windows/BSD); only the
# `system` component is needed — disk/network/etc. are off.
sysinfo = { version = "0.38", default-features = false, features = ["system"] }
# Timezone-correct local wall-clock for the tabbar widget.
chrono = { version = "0.4", default-features = false, features = ["clock"] }
# NVIDIA GPU utilization. Loads libnvidia-ml at runtime (dlopen), so it's safe
# to depend on unconditionally — `Nvml::init()` simply errors on machines
# without it, and we fall back to the OS-native GPU counter (see stats.rs).
nvml-wrapper = "0.12"
# Already vendored transitively (via sysinfo); used only to restore the default
# SIGPIPE disposition at startup so `superzej … | head` exits quietly.
libc = "0.2"

[profile.release]
strip = true
lto = "thin"
