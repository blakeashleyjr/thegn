[package]
name = "superzej"
version = "0.1.0"
edition = "2021"
description = "Terminal-native git-worktree IDE on top of zellij"
license = "MIT"
default-run = "superzej"

[[bin]]
name = "superzej"
path = "src/main.rs"

[dependencies]
clap = { version = "4.5", features = ["derive", "env"] }
rusqlite = { version = "0.32", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# Per-repo `.superzej.{yaml,yml}` overlay parsing (toml/json already covered).
serde_yaml = "0.9"
toml = "0.8"
walkdir = "2.5"
anyhow = "1"
syntect = { version = "5", default-features = false, features = [
  "default-syntaxes",
  "default-themes",
  "regex-fancy",
] }
# Cross-platform CPU/memory sampling (Linux/macOS/Windows/BSD); only the
# `system` component is needed — disk/network/etc. are off.
sysinfo = { version = "0.38", default-features = false, features = ["system"] }
# Timezone-correct local wall-clock for the tabbar widget.
chrono = { version = "0.4", default-features = false, features = ["clock"] }
# NVIDIA GPU utilization. Loads libnvidia-ml at runtime (dlopen), so it's safe
# to depend on unconditionally — `Nvml::init()` simply errors on machines
# without it, and we fall back to the OS-native GPU counter (see stats.rs).
nvml-wrapper = "0.12"
# Already vendored transitively (via sysinfo); used only to restore the default
# SIGPIPE disposition at startup so `superzej … | head` exits quietly.
libc = "0.2"
# Filesystem change notifications for the `watch` daemon (the panel's live diff
# refresh). Pure Rust; uses the OS-native backend (inotify on Linux).
notify = "6"

# --- cmd+k command palette (`superzej menu`) ---
# iocraft: React-like declarative TUI (flexbox via taffy, components + hooks);
# drives the full-screen palette. smol is its async runtime (render loop +
# `smol::Timer` poll ticks).
iocraft = "0.8.3"
smol = "2.0.2"
# nucleo: helix's fuzzy matcher — lock-free streaming over a background
# threadpool, so matching never blocks the UI thread.
nucleo = "0.5.0"
# ripgrep's own internals as libraries: `ignore` for the parallel,
# .gitignore-aware file walk; grep-searcher/regex for embedded content search.
ignore = "0.4.26"
grep-searcher = "0.1.16"
grep-regex = "0.1.14"
grep-matcher = "0.1.8"
# Structured, level-filtered diagnostics. `tracing` is the facade; the subscriber
# is hand-composed in src/log.rs (a custom branded formatter + a hand-rolled
# size-capped file sink) — so default-features off and no `tracing-appender`.
tracing = "0.1"
tracing-subscriber = { version = "0.3", default-features = false, features = [
  "std",
  "fmt",
  "ansi",
  "env-filter",
  "registry",
] }

[dev-dependencies]
# Stream combinators for the palette's in-process mock-terminal e2e tests
# (iocraft's `mock_terminal_render_loop` yields a `Stream<Canvas>`).
futures = "0.3"

[profile.release]
strip = true
lto = "thin"
